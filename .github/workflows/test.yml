---
# GitHub mirror of .forgejo/workflows/test.yml. GitHub-hosted runners execute
# as a non-root user, so this exercises the sudo elevation path in
# install-nushell.sh that the root-only Forgejo runner never hits. Same version
# matrix and assertions as the Forgejo workflow.
name: Test

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  install-nushell:
    name: Install Nushell ${{ matrix.nushell-version }}
    # GitHub-hosted, runs as the non-root `runner` user.
    runs-on: ubuntu-latest
    strategy:
      # Run every version even if one fails, so a single bad version does not
      # mask the others.
      fail-fast: false
      matrix:
        nushell-version:
          - '0.100.0'
          - '0.101.0'
          - 'latest'
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v4

      -
        name: Install Nushell
        id: nushell
        # Use the action from this checkout rather than a published ref.
        uses: ./
        with:
          nushell-version: ${{ matrix.nushell-version }}

      -
        name: Assert installed version
        shell: bash
        run: nu tests/assert-version.nu '${{ matrix.nushell-version }}' '${{ steps.nushell.outputs.nushell-version }}'
